<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คุณเป็นตัวละครหลักตัวไหนในฟิคของ the north</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #1a1a1a; 
            color: #e0e0e0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .quiz-container {
            background-color: #2a2a2a; 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 10px; color: #ffffff; }
        h2 { font-size: 18px; margin-bottom: 20px; color: #ffffff; line-height: 1.4; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 30px; font-weight: 300; line-height: 1.5; }
        .btn {
            background-color: #3d3d3d;
            color: #fff;
            border: 1px solid #555;
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            text-align: left;
            line-height: 1.5;
            display: block;
        }
        .btn:hover { background-color: #505050; border-color: #888; }
        .btn-center { text-align: center; background-color: #555; font-weight: 600; }
        #quiz-screen, #result-screen { display: none; }
        .result-image {
            max-width: 100%;
            max-height: 280px; 
            object-fit: contain;
            border-radius: 10px;
            margin: 15px 0;
            background: #000;
        }
        .result-desc {
            font-size: 15px;
            line-height: 1.6;
            color: #ccc;
            text-align: left;
            margin-bottom: 20px;
            max-height: 250px; 
            overflow-y: auto; 
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="start-screen">
            <h1>คุณเป็นตัวละครหลักตัวไหนในฟิคของ the north</h1>
            <p class="subtitle">This is just for fun! The personalities are based on the characters, so some traits might match you while others might not. (นิสัยเป็นนิสัยของตัวละคร อาจจะมีตรงคุณบ้าง ไม่ตรงบ้าง Don’t take it too seriously นะคะ)</p>
            <button class="btn btn-center" onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
        </div>

        <div id="quiz-screen">
            <h2 id="question-text"></h2>
            <div id="choices-container"></div>
        </div>

        <div id="result-screen">
            <h2 id="result-title"></h2>
            <img id="result-image" src="" alt="Result" class="result-image">
            <div id="result-desc" class="result-desc"></div>
            <button class="btn btn-center" onclick="location.reload()">เล่นอีกครั้ง</button>
        </div>
    </div>
