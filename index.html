<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คุณเป็นตัวละครหลักตัวไหนในฟิคของ the north</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

        /* เพิ่ม box-sizing เพื่อป้องกันไม่ให้กล่องล้นจอเวลาบวก padding */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #1a1a1a; 
            color: #e0e0e0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px; /* ลด padding นอกสุดลงนิดหน่อย */
        }

        .quiz-container {
            background-color: #2a2a2a; 
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1, h2, h3 { color: #ffffff; }
        
        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .btn {
            background-color: #444;
            color: #fff;
            border: 1px solid #555;
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-align: left;
        }

        .btn:hover {
            background-color: #666;
            border-color: #888;
        }

        .btn-center { text-align: center; background-color: #555; }
        .btn-center:hover { background-color: #777; }

        #quiz-screen, #result-screen { display: none; }

        .result-image {
            max-width: 100%;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
