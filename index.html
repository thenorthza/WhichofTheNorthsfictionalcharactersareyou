<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Which of The North's fictional characters are you</title>
    <style>
        /* สไตล์พื้นฐานตาม Palette สีของคุณ */
        body {
            background-color: #1F1D20; /* Raisin Black */
            color: #F5ECDC; /* Old Lace */
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* คอนเทนเนอร์หลักที่ยืดหยุ่นตามหน้าจอ */
        .container {
            width: 90%; /* กว้าง 90% ของหน้าจอโทรศัพท์ */
            max-width: 400px; /* แต่ไม่เกิน 400px ในคอม */
            margin: 20px auto;
            text-align: center;
        }

        /* ปุ่มเลือกคำตอบ ปรับให้ไม่คับจอ */
        .btn {
            background-color: #7B7369; /* Dim Gray */
            color: #F5ECDC;
            border: none;
            padding: 12px 20px;
            margin: 8px 0;
            width: 100%; /* ปุ่มกว้างเต็มคอนเทนเนอร์ */
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #D7C9B2; /* Dun */
            color: #1F1D20;
        }

        /* รูปภาพให้ย่อตามขนาดคอนเทนเนอร์ */
        #result-image {
            width: 100%;
            height: auto;
            border-radius: 15px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* --- จุดที่แก้ไข: กล่องข้อความผลลัพธ์ --- */
        .description-box {
            background-color: rgba(215, 201, 178, 0.1); /* Dun จางๆ */
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            
            /* ล็อคความสูงและทำให้ Scroll ได้ */
            height: 200px; 
            overflow-y: auto; 
            
            text-align: left;
            line-height: 1.6;
            font-size: 14px;
            border: 1px solid rgba(123, 115, 105, 0.3);
        }

        /* แต่ง Scrollbar ให้สวยๆ */
        .description-box::-webkit-scrollbar { width: 5px; }
        .description-box::-webkit-scrollbar-thumb { 
            background: #7B7369; 
            border-radius: 10px; 
        }

        #start-screen, #quiz-screen, #result-screen {
            display: none;
        }
        
        /* ให้หน้าแรกแสดงผลก่อน */
        #start-screen { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen">
            <h1>The North Character Quiz</h1>
            <p>มาดูกันว่าคุณคือใครในจักรวาลนี้</p>
            <button class="btn" onclick="startQuiz()">เริ่มเล่นเลย</button>
        </div>

        <div id="quiz-screen">
            <h2 id="question-text"></h2>
            <div id="choices-container"></div>
        </div>

        <div id="result-screen">
            <h2 id="result-title"></h2>
            <img id="result-image" src="" alt="Result">
            <div class="description-box" id="result-desc"></div>
            <button class="btn" style="margin-top: 20px;" onclick="location.reload()">เล่นอีกครั้ง</button>
        </div>
    </div>

    <script>
        // ใส่ข้อมูลผลลัพธ์ (ตัวอย่าง)
        const resultsData = {
            jedi: { title: "คุณคือ Jedi", img: "jedi.png", desc: "ถ้าคุณได้คำตอบเป็น เจได แสดงว่าคุณขี้แอ็ค ล้อเล่น... (ข้อความยาวๆ)" },
            aran: { title: "คุณคือ Aran", img: "aran.png", desc: "คำบรรยายของ Aran..." },
            // ... ใส่ให้ครบตามที่คุณเขียนไว้
        };

        // ใส่คะแนนเริ่มต้น
        const scores = { Jedi: 0, Aran: 0, Flynn: 0, Kurt: 0, Matthew: 0, June: 0, Keith: 0, Zayn: 0, Lynce: 0, Khluen: 0, Pynn: 0, Quin: 0, Jayne: 0 };

        // ใส่คำถามที่คุณส่งมา
        const questions = [
            // ... ก๊อปปี้คำถามทั้งหมดที่คุณส่งมาใส่ตรงนี้ได้เลยครับ
        ];

        // --- โค้ดส่วน Logic ฟังก์ชันต่างๆ เหมือนเดิมของคุณ ---
        let currentQuestion = 0;

        function startQuiz() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            let qData = questions[currentQuestion];
            document.getElementById('question-text').innerText = qData.q;
            let choicesHTML = "";
            for (let i = 0; i < qData.a.length; i++) {
                choicesHTML += `<button class="btn" onclick="selectAnswer(${i})">${qData.a[i].t}</button>`;
            }
            document.getElementById('choices-container').innerHTML = choicesHTML;
        }

        function selectAnswer(choiceIndex) {
            let pointsData = questions[currentQuestion].a[choiceIndex].p;
            for (let character in pointsData) {
                if (scores[character] !== undefined) {
                    scores[character] += pointsData[character];
                }
            }
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            let maxScore = -999;
            let winner = "";
            for (let char in scores) {
                if (scores[char] > maxScore) {
                    maxScore = scores[char];
                    winner = char;
                }
            }
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            let finalData = resultsData[winner.toLowerCase()] || {title: winner, img: winner.toLowerCase()+".png", desc: "คำบรรยายตัวละคร..."};
            document.getElementById('result-title').innerText = "คุณคือ " + finalData.title;
            document.getElementById('result-image').src = finalData.img;
            document.getElementById('result-desc').innerText = finalData.desc;
        }
    </script>
</body>
</html>
